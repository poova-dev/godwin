<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homepage Editor | Godwin Admin</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-sidebar-header">
        <div class="logo-badge" style="width: 36px; height: 36px; font-size: 1.1rem;">G</div>
        <div style="font-weight: 700; color: #fff;">Godwin Admin</div>
      </div>

      <a href="dashboard.html" class="admin-nav-item">📊 Overview</a>
      <a href="homepage.html" class="admin-nav-item active">🏠 Homepage Editor</a>
      <a href="settings.html" class="admin-nav-item">⚙️ School Settings</a>
      <a href="media.html" class="admin-nav-item">☁️ Cloudinary Media</a>
      <a href="../index.html" target="_blank" class="admin-nav-item" style="margin-top: auto;">🌐 View Live Site ↗</a>
      <button onclick="logoutAdmin()" class="admin-nav-item" style="background: none; border: none; text-align: left; color: #ef4444;">🚪 Sign Out</button>
    </aside>

    <main class="admin-main">
      <div class="admin-header-bar">
        <div>
          <h1 style="font-size: 1.6rem; color: var(--primary-navy);">Homepage Content Editor</h1>
          <p style="font-size: 0.85rem; color: var(--text-muted);">Edit main banner text, subtitles, and notices</p>
        </div>
      </div>

      <div class="admin-card">
        <h2 style="font-size: 1.2rem; color: var(--primary-navy); margin-bottom: 1rem;">Main Hero Banner Text</h2>
        <form onsubmit="event.preventDefault(); const data = getStoredSiteData(); data.heroTitle = this.heroTitle.value; data.heroSubtitle = this.heroSubtitle.value; saveSiteData(data);">
          <div class="form-group">
            <label>Hero Title / Headline</label>
            <input type="text" id="heroTitle" name="heroTitle" class="form-control">
          </div>

          <div class="form-group">
            <label>Hero Subtitle / Description</label>
            <textarea id="heroSubtitle" name="heroSubtitle" rows="3" class="form-control"></textarea>
          </div>

          <button type="submit" class="btn-primary">Save Homepage Content</button>
        </form>
      </div>
    </main>
  </div>

  <script src="../assets/js/admin.js"></script>
  <script>
    checkAdminAuth();
    document.addEventListener('DOMContentLoaded', () => {
      const data = getStoredSiteData();
      if (document.getElementById('heroTitle')) document.getElementById('heroTitle').value = data.heroTitle || '';
      if (document.getElementById('heroSubtitle')) document.getElementById('heroSubtitle').value = data.heroSubtitle || '';
    });
  </script>
</body>
</html>
