<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School Settings | Godwin Admin</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-sidebar-header">
        <div class="logo-badge" style="width: 36px; height: 36px; font-size: 1.1rem;">G</div>
        <div style="font-weight: 700; color: #fff;">Godwin Admin</div>
      </div>

      <a href="dashboard.html" class="admin-nav-item">📊 Overview</a>
      <a href="homepage.html" class="admin-nav-item">🏠 Homepage Editor</a>
      <a href="settings.html" class="admin-nav-item active">⚙️ School Settings</a>
      <a href="media.html" class="admin-nav-item">☁️ Cloudinary Media</a>
      <a href="../index.html" target="_blank" class="admin-nav-item" style="margin-top: auto;">🌐 View Live Site ↗</a>
      <button onclick="logoutAdmin()" class="admin-nav-item" style="background: none; border: none; text-align: left; color: #ef4444;">🚪 Sign Out</button>
    </aside>

    <main class="admin-main">
      <div class="admin-header-bar">
        <div>
          <h1 style="font-size: 1.6rem; color: var(--primary-navy);">School Contact Settings</h1>
          <p style="font-size: 0.85rem; color: var(--text-muted);">Manage address, phone numbers, and WhatsApp links</p>
        </div>
      </div>

      <div class="admin-card">
        <form onsubmit="event.preventDefault(); const data = getStoredSiteData(); data.schoolName = this.schoolName.value; data.phonePrimary = this.phonePrimary.value; data.whatsappNumber = this.whatsappNumber.value; data.address = this.address.value; saveSiteData(data);">
          <div class="form-group">
            <label>School Name</label>
            <input type="text" id="schoolName" name="schoolName" class="form-control">
          </div>

          <div class="form-group">
            <label>Primary Phone</label>
            <input type="text" id="phonePrimary" name="phonePrimary" class="form-control">
          </div>

          <div class="form-group">
            <label>WhatsApp Number</label>
            <input type="text" id="whatsappNumber" name="whatsappNumber" class="form-control">
          </div>

          <div class="form-group">
            <label>Address (Corrected Spelling)</label>
            <input type="text" id="address" name="address" class="form-control">
          </div>

          <button type="submit" class="btn-primary">Save School Settings</button>
        </form>
      </div>
    </main>
  </div>

  <script src="../assets/js/admin.js"></script>
  <script>
    checkAdminAuth();
    document.addEventListener('DOMContentLoaded', () => {
      const data = getStoredSiteData();
      if (document.getElementById('schoolName')) document.getElementById('schoolName').value = data.schoolName || '';
      if (document.getElementById('phonePrimary')) document.getElementById('phonePrimary').value = data.phonePrimary || '';
      if (document.getElementById('whatsappNumber')) document.getElementById('whatsappNumber').value = data.whatsappNumber || '';
      if (document.getElementById('address')) document.getElementById('address').value = data.address || '';
    });
  </script>
</body>
</html>
