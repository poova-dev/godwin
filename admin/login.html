<!DOCTYPE html>
<html lang="en" class="h-full bg-[#03224d]">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Portal Login | Godwin Public School</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet" />
</head>
<body class="h-full bg-gradient-to-br from-[#03224d] via-[#0D4234] to-[#01142d] text-white font-sans flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-white/10 backdrop-blur-xl border border-white/15 rounded-3xl p-8 shadow-2xl space-y-6 relative overflow-hidden">
    <!-- Top Brand Header -->
    <div class="text-center space-y-3">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-white/10 border border-white/20 shadow-inner">
        <img src="../assets/images/logo.png" alt="Godwin Emblem" class="w-10 h-10 object-contain drop-shadow" onError="this.style.display='none'; this.nextElementSibling.style.display='block';" />
        <span class="material-symbols-outlined text-3xl text-[#ffdea6] hidden">school</span>
      </div>
      <h1 class="text-2xl font-extrabold tracking-tight text-white">Godwin Public School</h1>
      <p class="text-xs uppercase tracking-widest text-[#ffdea6] font-semibold">Admin Control Panel</p>
    </div>

    <!-- Error Alert Banner -->
    <div id="errorAlert" class="hidden p-3.5 rounded-xl bg-red-500/20 border border-red-500/40 text-red-200 text-xs font-semibold text-center animate-pulse">
      <span id="errorMessage">Invalid password. Please try again.</span>
    </div>

    <!-- Login Form -->
    <form id="adminLoginForm" class="space-y-4">
      <div>
        <label class="block text-xs font-bold uppercase tracking-wider text-white/80 mb-1.5" for="adminPassword">Master Admin Password</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-white/50 text-xl">lock</span>
          <input
            id="adminPassword"
            name="password"
            type="password"
            required
            placeholder="Enter admin password"
            class="w-full pl-11 pr-11 py-3.5 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-[#ffdea6] focus:border-transparent text-sm transition-all"
          />
          <button type="button" onclick="togglePasswordVisibility()" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-white/60 hover:text-white transition-colors">
            <span id="visibilityIcon" class="material-symbols-outlined text-xl">visibility</span>
          </button>
        </div>
      </div>

      <button
        type="submit"
        id="loginSubmitBtn"
        class="w-full py-3.5 px-4 bg-gradient-to-r from-[#E0701B] to-[#7b5800] hover:from-[#f7bd48] hover:to-[#E0701B] text-white font-bold text-sm uppercase tracking-wider rounded-xl shadow-lg hover:shadow-xl transition-all duration-200 flex items-center justify-center gap-2 active:scale-[0.98]">
        <span class="material-symbols-outlined text-lg">login</span>
        <span>Authenticate &amp; Enter</span>
      </button>
    </form>

    <!-- Footer info -->
    <div class="pt-4 border-t border-white/10 text-center">
      <p class="text-[11px] text-white/60">
        Protected by Cloudflare Functions &amp; KV Security • Sahakar Nagar Campus
      </p>
    </div>
  </div>

  <script src="../assets/js/admin.js"></script>
  <script>
    function togglePasswordVisibility() {
      const passInput = document.getElementById('adminPassword');
      const icon = document.getElementById('visibilityIcon');
      if (passInput.type === 'password') {
        passInput.type = 'text';
        icon.textContent = 'visibility_off';
      } else {
        passInput.type = 'password';
        icon.textContent = 'visibility';
      }
    }

    document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const password = document.getElementById('adminPassword').value;
      const alertBox = document.getElementById('errorAlert');
      const errorMsg = document.getElementById('errorMessage');
      const submitBtn = document.getElementById('loginSubmitBtn');

      alertBox.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.innerHTML = `<span class="material-symbols-outlined animate-spin text-lg">sync</span> <span>Verifying...</span>`;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await res.json().catch(() => ({}));

        if (res.ok && data.success) {
          submitBtn.innerHTML = `<span class="material-symbols-outlined text-lg">check_circle</span> <span>Access Granted</span>`;
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 400);
        } else {
          errorMsg.textContent = data.error || 'Invalid password. Please try again.';
          alertBox.classList.remove('hidden');
          submitBtn.disabled = false;
          submitBtn.innerHTML = `<span class="material-symbols-outlined text-lg">login</span> <span>Authenticate &amp; Enter</span>`;
        }
      } catch (err) {
        // Fallback for local preview mode if Cloudflare Functions endpoint is not running locally
        if (password === 'godwin2026') {
          sessionStorage.setItem('godwin_admin_authenticated', 'true');
          window.location.href = 'dashboard.html';
        } else {
          errorMsg.textContent = 'Connection error or invalid password.';
          alertBox.classList.remove('hidden');
          submitBtn.disabled = false;
          submitBtn.innerHTML = `<span class="material-symbols-outlined text-lg">login</span> <span>Authenticate &amp; Enter</span>`;
        }
      }
    });
  </script>
</body>
</html>
