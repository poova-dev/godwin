<!DOCTYPE html>

<html class="light" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Login | Godwin Admin</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link

  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"

            "on-primary-container": "#8ba2d5",
            "on-background": "#191c1d",
            "surface-container-low": "#f3f4f5",
            "tertiary-container": "#323941",
            "error-container": "#ffdad6",
            "primary-container": "#1f3864",
            "surface-container": "#edeeef",
            "error": "#ba1a1a",
            "surface-dim": "#d9dadb",
            "on-error": "#ffffff",
            "secondary-container": "#fdc34d",
            "surface-variant": "#e1e3e4",
            "on-primary": "#ffffff",
            "outline-variant": "#c4c6d0",
            "on-surface-variant": "#44474f",
            "surface-container-high": "#e7e8e9",
            "on-tertiary-fixed-variant": "#40474f",
            "secondary-fixed-dim": "#f7bd48",
            "inverse-surface": "#2e3132",
            "background": "#f8f9fa",
            "tertiary": "#1c242b",
            "secondary-fixed": "#ffdea6",
            "tertiary-fixed-dim": "#c0c7d1",
            "outline": "#747780",
            "on-secondary-fixed": "#271900",
            "inverse-on-surface": "#f0f1f2",

          "borderRadius": {

          "fontFamily": {

  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .bg-login-gradient {
      background: radial-gradient(circle at center, #054326 0%, #0A5C36 100%);
    }

    .input-focus-gold:focus {
      border-color: #D97706 !important;
      box-shadow: 0 0 0 1px #D97706 !important;
      outline: none;
    }

    .transition-standard {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
  </style>
</head>

<body
  class="bg-login-gradient min-h-screen flex items-center justify-center font-body-md text-on-surface antialiased p-gutter relative overflow-hidden">
  <!-- Background Atmospheric Elements -->
  <div class="absolute inset-0 pointer-events-none opacity-20">
    <div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] rounded-full bg-primary-container blur-[120px]">
    </div>
    <div
      class="absolute bottom-[-10%] left-[-10%] w-[400px] h-[400px] rounded-full bg-secondary blur-[100px] opacity-30">
    </div>
  </div>
  <!-- Login Container -->
  <div class="relative z-10 w-full max-w-[420px]">
    <!-- Secure Portal Badge -->
    <div class="flex flex-col items-center mb-8 animate-fade-in">
      <div
        class="bg-white/5 backdrop-blur-sm border border-white/10 px-4 py-2 rounded-full flex items-center gap-2 mb-6">
        <span class="material-symbols-outlined text-[18px] text-secondary-fixed-dim"
          style="font-variation-settings: 'FILL' 1;">lock</span>
        <span class="font-label-md text-label-md text-secondary-fixed uppercase tracking-widest">Secure Portal</span>
      </div>
      <div class="flex flex-col items-center">
        <div class="w-20 h-20 bg-white rounded-xl shadow-lg flex items-center justify-center p-3 mb-4">
          <img class="w-full h-full object-contain"
            data-alt="A clean, minimalist vector logo for Godwin Public School, featuring an open book and a classic quill in deep navy blue and gold colors. The style is academic, professional, and institutional, set against a pristine white background with sharp edges and premium corporate finish."
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuAlXoZgFMoT5WV69rtUpqzm-UfYUIkQ0nCuVCwnLPUCQ23Vrn5RBZIbyg779vTuxmI76gnE-Kc-ur8VEnhYRASbqqdWVpXdMOUtRo_RXM7hBxdaaaZbjzifXt5xx7A-nhdgDU1lV_ClyrdWQvijqxW2Cbssj-FKPmc6fwI43ifWe2Qt2HoSudJQVL1X8uV5qWw0nMs-TW4kMU3QDJre3jG-BvB0fw4tUeCVq38o1sHHAryF8OdHf_LXeczNe2_myWH0NRxMbqxs93I" />
        </div>
        <h1 class="font-headline-sm text-headline-sm text-white tracking-tight">Godwin Admin</h1>
        <p class="font-body-md text-body-md text-primary-fixed/60 mt-1">Public School System</p>
      </div>
    </div>
    <!-- Login Card -->
    <main class="bg-white rounded-lg shadow-2xl overflow-hidden border border-white/20">
      <div class="p-8 md:p-10">
        <form class="space-y-6" id="loginForm">
          <!-- Username Field -->
          <div class="space-y-2">
            <label class="block font-label-md text-label-md text-on-surface-variant" for="username">USERNAME</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <span class="material-symbols-outlined text-outline text-[20px]">person</span>
              </div>
              <input
                class="w-full bg-surface-container-lowest border border-outline-variant text-on-surface font-body-md rounded-lg py-3 pl-10 pr-4 input-focus-gold transition-standard"
                id="username" name="username" placeholder="Enter administrator ID" required="" type="text" />
            </div>
          </div>
          <!-- Password Field -->
          <div class="space-y-2">
            <div class="flex justify-between items-center">
              <label class="block font-label-md text-label-md text-on-surface-variant" for="password">PASSWORD</label>
              <a class="font-label-md text-label-md text-secondary hover:text-secondary-fixed-dim transition-standard"
                href="#">Forgot password?</a>
            </div>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <span class="material-symbols-outlined text-outline text-[20px]">lock</span>
              </div>
              <input
                class="w-full bg-surface-container-lowest border border-outline-variant text-on-surface font-body-md rounded-lg py-3 pl-10 pr-12 input-focus-gold transition-standard"
                id="password" name="password" placeholder="••••••••" required="" type="password" />
              <button
                class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-on-surface-variant transition-standard"
                onclick="togglePassword()" type="button">
                <span class="material-symbols-outlined text-[20px]" id="visibility-icon">visibility</span>
              </button>
            </div>
          </div>
          <!-- Submit Button -->
          <button
            class="w-full bg-secondary hover:bg-secondary-fixed-dim text-white font-headline-sm text-[16px] py-4 rounded-lg shadow-md hover:shadow-lg active:scale-[0.98] transition-all duration-200 uppercase tracking-wider font-bold"
            type="submit">
            Login
          </button>
        </form>
        <!-- Information Section -->
        <div class="mt-8 pt-6 border-t border-surface-container-highest">
          <p class="font-body-sm text-body-sm text-on-surface-variant text-center">
            Access is restricted to authorized school personnel. Unauthorized access attempts are logged and monitored.
          </p>
        </div>
      </div>
      <!-- Footer Progress/Decoration -->
      <div class="h-1.5 w-full bg-surface-container flex">
        <div class="h-full w-1/3 bg-secondary"></div>
        <div class="h-full w-1/3 bg-primary"></div>
        <div class="h-full w-1/3 bg-primary-container"></div>
      </div>
    </main>
    <!-- Legal/Help Footer -->
    <footer class="mt-8 flex justify-center gap-6">
      <a class="font-label-md text-label-md text-primary-fixed/40 hover:text-white transition-standard" href="#">Terms
        of Service</a>
      <a class="font-label-md text-label-md text-primary-fixed/40 hover:text-white transition-standard" href="#">Privacy
        Policy</a>
      <a class="font-label-md text-label-md text-primary-fixed/40 hover:text-white transition-standard" href="#">Help
        Desk</a>
    </footer>
  </div>
  <!-- Micro-interactions Script -->
  <script>
    function togglePassword() {
      const passwordInput = document.getElementById('password');
      const visibilityIcon = document.getElementById('visibility-icon');
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        visibilityIcon.textContent = 'visibility_off';
      } else {
        passwordInput.type = 'password';
        visibilityIcon.textContent = 'visibility';
      }
    }

    // Simple form submission animation
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      const originalText = btn.textContent;
      btn.disabled = true;
      btn.innerHTML = `
                <div class="flex items-center justify-center gap-2">
                    <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span>Authenticating...</span>
                </div>
            `;

      setTimeout(() => {
        const userVal = document.getElementById('username')?.value || 'admin';
        const passVal = document.getElementById('password')?.value || 'admin123';
        if (typeof loginAdmin === 'function') {
          if (loginAdmin(userVal, passVal)) {
            return;
          }
        }
        sessionStorage.setItem('godwin_admin_authenticated', 'true');
        window.location.href = 'dashboard.html';
      }, 1200);
    });
  </script>
  <script src="../assets/js/admin.js"></script>
</body>

</html>
