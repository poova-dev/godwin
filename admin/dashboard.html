<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Godwin Admin — Redirecting...</title>
  <meta http-equiv="refresh" content="0; url=index.html">
  <style>
    body {
      margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #03224d, #0D4234, #01142d);
      color: white; font-family: 'Segoe UI', Arial, sans-serif;
    }
    .loader { text-align: center; }
    .spinner {
      width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #ffdea6; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p>Loading Godwin Admin Dashboard...</p>
  </div>
  <script>
    // index.html is the real, single dashboard (Overview/Content/Notices/Facilities/
    // Inbox/Media/Settings are all tabs there). This page only exists so old links
    // to "dashboard.html" still work.
    window.location.replace('index.html');
  </script>
</body>
</html>
